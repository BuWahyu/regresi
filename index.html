<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scatter Regression Studio</title>

    <!-- ChartJS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="header-left">
        <div class="header-title">Scatter Regression Studio</div>
        <div class="header-author">By Wahyu Wijayanti, S.Pd., M.Pd.</div>
    </div>
    <div class="toggle-dark" onclick="toggleDark()"></div>
</header>

<div class="container">

    <div class="panel left">
        <h3>Input Data</h3>

        <table id="dataTable">
            <thead>
                <tr>
                    <th>X</th>
                    <th>Y</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button class="btn-green" onclick="addRow()">Tambah Data</button>
        <button class="btn-primary" onclick="generateChart()">Tampilkan Diagram</button>
        <button class="btn-reset" onclick="resetAll()">Reset</button>

        <div class="stats">
            <div class="stat-box">Data: <span id="count">0</span></div>
            <div class="stat-box">Slope: <span id="slope">-</span></div>
            <div class="stat-box">Intercept: <span id="intercept">-</span></div>
            <div class="stat-box">R²: <span id="r2">-</span></div>
            <div class="stat-box" style="grid-column:1/3;">
                Persamaan: <span id="equation">-</span>
            </div>
        </div>
    </div>

    <div class="panel right">
        <h3>Visualisasi</h3>

        <div class="interpretation-box" id="interpretationContent">
            Masukkan data dan tampilkan diagram untuk melihat interpretasi.
        </div>

        <div class="chart-container">
            <canvas id="scatterChart"></canvas>
        </div>
    </div>

</div>

<footer class="visitor-footer">
    <div class="visitor-card">
        <div>👥</div>
        <div>
            <div>Total Pengunjung</div>
            <div class="visitor-number" id="visitorCount">0</div>
        </div>
    </div>
</footer>
<!-- ===============================
     POPUP WELCOME QUOTES
================================ -->

<div id="quoteOverlay" class="quote-overlay">
    <div class="quote-modal">
        <div class="quote-close" onclick="closeQuote()">✖</div>

        <div class="quote-header">
            <span id="quoteIcon" class="quote-icon"></span>
            <span id="quoteCategory" class="quote-category"></span>
        </div>

        <div id="quoteText" class="quote-text"></div>
    </div>
</div>
<!-- JS utama -->
<script src="app.js"></script>

</body>
</html>
